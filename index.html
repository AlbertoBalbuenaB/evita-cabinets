<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/evita_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotation System - Evita Cabinets</title>
    <script>
      // Pre-paint theme resolution to avoid FOUC. Mirrors src/lib/theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem('evita:theme');
          var pref = stored === 'light' || stored === 'midnight' || stored === 'system' ? stored : 'system';
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'midnight' : 'light')
            : pref;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
